[advisories]
ignore = [
    # rand 0.7.3: unsound only when using a custom logger with rand::rng().
    # Clarity does not use custom loggers, and this is a deep transitive dep
    # via tauri-utils → kuchikiki → selectors → phf_codegen → phf_generator.
    # Tracked upstream; will resolve when Tauri updates its dependency tree.
    "RUSTSEC-2026-0097",
    # glib 0.18.5: unsound Iterator impl for VariantStrIter.
    # Only affects Linux (GTK bindings). Clarity does not use VariantStrIter
    # directly; this comes via Tauri/wry on Linux.
    "RUSTSEC-2024-0429",
]
