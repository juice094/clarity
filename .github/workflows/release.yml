name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: crates/clarity-tauri/frontend
        run: npm ci && npm run build

      - name: Install cargo-binstall
        shell: pwsh
        run: |
          $script = Invoke-RestMethod -Uri https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1
          Invoke-Expression "$script"

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --locked --no-confirm

      - name: Build Tauri
        working-directory: crates/clarity-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: cargo tauri build

      - name: Generate self-signed certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigning `
            -Subject "CN=Clarity" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(1)
          $pwd = ConvertTo-SecureString -String "clarity-sign" -Force -AsPlainText
          Export-PfxCertificate `
            -Cert $cert `
            -FilePath "$env:RUNNER_TEMP\clarity.pfx" `
            -Password $pwd | Out-Null
          Write-Output "THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sign binaries and installers
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" | Select-Object -First 1
          if (-not $signtool) {
            $signtool = Get-ChildItem -Path "C:\Program Files\Windows Kits" -Recurse -Filter "signtool.exe" | Select-Object -First 1
          }

          $targets = @(
            "target\release\clarity-tauri.exe",
            (Get-ChildItem -Path "target\release\bundle\msi\*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1),
            (Get-ChildItem -Path "target\release\bundle\nsis\*.exe" -Exclude "*.sig" -ErrorAction SilentlyContinue | Select-Object -First 1)
          )

          foreach ($t in $targets) {
            if ($t -and (Test-Path $t)) {
              & $signtool.FullName sign `
                /f "$env:RUNNER_TEMP\clarity.pfx" `
                /p "clarity-sign" `
                /tr "http://timestamp.digicert.com" `
                /td sha256 `
                /fd sha256 `
                /a `
                $t
              Write-Output "Signed: $t"
            }
          }

      - name: Generate latest.json for updater
        shell: pwsh
        working-directory: crates/clarity-tauri
        run: |
          $tag = "${{ github.ref_name }}"
          $nsis = Get-ChildItem -Path "target\release\bundle\nsis\*.exe" -Exclude "*.sig" | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path "target\release\bundle\nsis\*.exe.sig" | Select-Object -First 1
          $msi = Get-ChildItem -Path "target\release\bundle\msi\*.msi" -Exclude "*.sig" | Select-Object -First 1
          $msiSig = Get-ChildItem -Path "target\release\bundle\msi\*.msi.sig" | Select-Object -First 1

          $sig = ""
          if ($nsisSig) { $sig = (Get-Content $nsisSig.FullName -Raw).Trim() }
          elseif ($msiSig) { $sig = (Get-Content $msiSig.FullName -Raw).Trim() }

          $date = (Get-Date -Format "o")
          $nsisUrl = if ($nsis) { "https://github.com/juice094/clarity/releases/download/$tag/$($nsis.Name)" } else { "" }
          $msiUrl = if ($msi) { "https://github.com/juice094/clarity/releases/download/$tag/$($msi.Name)" } else { "" }

          $platform = [ordered]@{
            signature = $sig
            url = $nsisUrl
          }
          if ($msiUrl) {
            $platform["msi-url"] = $msiUrl
          }

          $obj = [ordered]@{
            version = $tag
            notes = "See release notes at https://github.com/juice094/clarity/releases/tag/$tag"
            pub_date = $date
            platforms = [ordered]@{
              "windows-x86_64" = $platform
            }
          }

          $obj | ConvertTo-Json -Depth 10 | Set-Content -Path "target\release\bundle\latest.json" -Encoding utf8
          Write-Output "Generated latest.json for $tag"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clarity-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
            target/release/bundle/msi/*.sig
            target/release/bundle/latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
            target/release/bundle/nsis/*.sig
            target/release/bundle/msi/*.sig
            target/release/bundle/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
