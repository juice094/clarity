name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build egui release binary
        run: cargo build --release -p clarity-egui

      - name: Generate self-signed certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigning `
            -Subject "CN=Clarity" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(1)
          $pwd = ConvertTo-SecureString -String "clarity-sign" -Force -AsPlainText
          Export-PfxCertificate `
            -Cert $cert `
            -FilePath "$env:RUNNER_TEMP\clarity.pfx" `
            -Password $pwd | Out-Null
          Write-Output "THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Sign binary
        shell: pwsh
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" | Select-Object -First 1
          if (-not $signtool) {
            $signtool = Get-ChildItem -Path "C:\Program Files\Windows Kits" -Recurse -Filter "signtool.exe" | Select-Object -First 1
          }

          $binary = "target\release\clarity-egui.exe"
          if (Test-Path $binary) {
            & $signtool.FullName sign `
              /f "$env:RUNNER_TEMP\clarity.pfx" `
              /p "clarity-sign" `
              /tr "http://timestamp.digicert.com" `
              /td sha256 `
              /fd sha256 `
              /a `
              $binary
            Write-Output "Signed: $binary"
          } else {
            Write-Error "Binary not found: $binary"
            exit 1
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clarity-windows
          path: |
            target/release/clarity-egui.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/clarity-egui.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
