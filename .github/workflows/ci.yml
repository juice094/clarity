name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - name: Diagnostics (clarity-egui deps)
        run: |
          echo "=== clarity-egui Cargo.toml ==="
          cat crates/clarity-egui/Cargo.toml
          echo "=== cargo tree for clarity-egui ==="
          cargo tree -p clarity-egui || true
      - run: cargo check --workspace

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - run: cargo test --workspace --lib

  clippy:
    name: Clippy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - run: cargo clippy --workspace --lib --bins --tests -- -D warnings

  fmt:
    name: Rustfmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      # Deny only soundness issues and yanked crates.
      # Unmaintained warnings from upstream transitive deps are tracked
      # separately (see cargo-audit output) but do not block CI.
      - run: cargo audit --deny unsound --deny yanked

  doc-guard:
    name: Documentation Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify crate documentation presence
        run: |
          MISSING=0
          for crate in crates/*/; do
            name=$(basename "$crate")
            if [ ! -f "$crate/README.md" ]; then
              echo "❌ MISSING: $crate/README.md"
              MISSING=1
            else
              echo "✅ $crate/README.md"
            fi
            if [ ! -f "$crate/AGENTS.md" ]; then
              echo "❌ MISSING: $crate/AGENTS.md"
              MISSING=1
            else
              echo "✅ $crate/AGENTS.md"
            fi
          done
          if [ $MISSING -ne 0 ]; then
            echo "Documentation guard FAILED: some crates lack README.md or AGENTS.md"
            exit 1
          fi
          echo "Documentation guard PASSED: all crates have README.md and AGENTS.md"
      - name: Check rustdoc compilation
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      # TODO: revert to cargo-tarpaulin once pulp const-eval panic is resolved.
      # See https://github.com/juice094/clarity/issues/XXX
      - run: cargo test --workspace --lib
