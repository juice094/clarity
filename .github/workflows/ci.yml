name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --lib --bins --exclude clarity-slint

  hermes-feature-check:
    name: Hermes Feature Check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: |
          if [ ! -f "../../../hermes-memory/crates/hermes-memory-core/Cargo.toml" ]; then
            echo "hermes-memory repository not found; skipping hermes feature check."
            exit 0
          fi
          cargo check --workspace --lib --bins --exclude clarity-slint --features hermes

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - run: cargo test --workspace --lib --exclude clarity-slint

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - run: cargo test -p clarity-integration-tests --lib

  binary-test:
    name: Binary Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - run: cargo test --workspace --bins --exclude clarity-slint -- --test-threads=2

  doc-test:
    name: Doc Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - run: cargo test --workspace --doc --exclude clarity-slint -- --test-threads=2

  session-migration-test:
    name: Session Migration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - run: cargo clippy -p clarity-core --features session-migration --lib --tests -- -D warnings
      - run: cargo clippy -p clarity-headless --features session-migration --bins --tests -- -D warnings
      - run: cargo test -p clarity-core --features session-migration --lib
      - run: cargo test -p clarity-headless --features session-migration --bins -- --test-threads=2

  clippy:
    name: Clippy
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - run: cargo clippy --workspace --lib --bins --tests --exclude clarity-slint -- -D warnings

  fmt:
    name: Rustfmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      # Deny only soundness issues and yanked crates.
      # Unmaintained warnings from upstream transitive deps are tracked
      # separately (see cargo-audit output) but do not block CI.
      - run: cargo audit --deny unsound --deny yanked

  doc-guard:
    name: Documentation Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - name: Verify crate documentation presence
        run: |
          MISSING=0
          for crate in crates/*/; do
            name=$(basename "$crate")
            if [ ! -f "$crate/README.md" ]; then
              echo "❌ MISSING: $crate/README.md"
              MISSING=1
            else
              echo "✅ $crate/README.md"
            fi
            if [ ! -f "$crate/AGENTS.md" ]; then
              echo "❌ MISSING: $crate/AGENTS.md"
              MISSING=1
            else
              echo "✅ $crate/AGENTS.md"
            fi
          done
          if [ $MISSING -ne 0 ]; then
            echo "Documentation guard FAILED: some crates lack README.md or AGENTS.md"
            exit 1
          fi
          echo "Documentation guard PASSED: all crates have README.md and AGENTS.md"
      - name: Verify module structure
        run: |
          if ! command -v cargo-modules &> /dev/null; then
            cargo install cargo-modules
          fi
          cargo modules structure --package clarity-core --max-depth 3
      - name: Check rustdoc compilation
        run: cargo doc --workspace --no-deps --exclude clarity-slint
        env:
          RUSTDOCFLAGS: "-D warnings"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/ensure-hermes-stubs
      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libglib2.0-dev pkg-config libgtk-3-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          key: ci-fix-2026-05-06-v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate LCOV coverage report
        run: cargo llvm-cov --workspace --lib --exclude clarity-slint --lcov --output-path lcov.info
      - name: Print coverage summary
        run: cargo llvm-cov report --summary
      - name: Generate HTML coverage report
        run: cargo llvm-cov report --html --output-dir coverage
      - name: Upload LCOV coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/
