name: Ensure hermes-memory stubs
 description: |
   Creates minimal stub crates for the optional `hermes-memory` dependencies
   when the real repository is not checked out. This lets Cargo load manifests
   for the default (non-hermes) build.
runs:
  using: composite
  steps:
    - name: Ensure hermes-memory stubs (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        REPO_ROOT="$(cd "${{ github.workspace }}/.." && pwd)"
        HERMES_ROOT="${REPO_ROOT}/hermes-memory"
        if [ -f "${HERMES_ROOT}/crates/hermes-memory-core/Cargo.toml" ]; then
          echo "hermes-memory already present; skipping stub creation."
          exit 0
        fi
        echo "Creating hermes-memory stubs at ${HERMES_ROOT}..."
        mkdir -p "${HERMES_ROOT}/crates/hermes-memory-core/src"
        mkdir -p "${HERMES_ROOT}/crates/hermes-memory-store/src"
        mkdir -p "${HERMES_ROOT}/crates/hermes-memory-search/src"
        cat > "${HERMES_ROOT}/crates/hermes-memory-core/Cargo.toml" <<'EOF'
        [package]
        name = "hermes-memory-core"
        version = "0.1.0-dev"
        edition = "2021"
        license = "AGPL-3.0-or-later"
        description = "Stub crate for optional hermes-memory integration."
        EOF
        printf '// Stub implementation.\n' > "${HERMES_ROOT}/crates/hermes-memory-core/src/lib.rs"
        cat > "${HERMES_ROOT}/crates/hermes-memory-store/Cargo.toml" <<'EOF'
        [package]
        name = "hermes-memory-store"
        version = "0.1.0-dev"
        edition = "2021"
        license = "AGPL-3.0-or-later"
        description = "Stub crate for optional hermes-memory integration."
        EOF
        printf '// Stub implementation.\n' > "${HERMES_ROOT}/crates/hermes-memory-store/src/lib.rs"
        cat > "${HERMES_ROOT}/crates/hermes-memory-search/Cargo.toml" <<'EOF'
        [package]
        name = "hermes-memory-search"
        version = "0.1.0-dev"
        edition = "2021"
        license = "AGPL-3.0-or-later"
        description = "Stub crate for optional hermes-memory integration."
        EOF
        printf '// Stub implementation.\n' > "${HERMES_ROOT}/crates/hermes-memory-search/src/lib.rs"
        echo "hermes-memory stubs created."

    - name: Ensure hermes-memory stubs (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $hermesRoot = Join-Path '${{ github.workspace }}' '..' 'hermes-memory' -Resolve
        $coreToml = Join-Path $hermesRoot 'crates' 'hermes-memory-core' 'Cargo.toml'
        if (Test-Path $coreToml) {
            Write-Host 'hermes-memory already present; skipping stub creation.'
            exit 0
        }
        Write-Host "Creating hermes-memory stubs at $hermesRoot..."
        New-Item -ItemType Directory -Force -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-core' 'src') | Out-Null
        New-Item -ItemType Directory -Force -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-store' 'src') | Out-Null
        New-Item -ItemType Directory -Force -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-search' 'src') | Out-Null
        '[package]', 'name = "hermes-memory-core"', 'version = "0.1.0-dev"', 'edition = "2021"', 'license = "AGPL-3.0-or-later"', 'description = "Stub crate for optional hermes-memory integration."' | Set-Content -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-core' 'Cargo.toml') -Encoding UTF8
        '// Stub implementation.' | Set-Content -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-core' 'src' 'lib.rs') -Encoding UTF8
        '[package]', 'name = "hermes-memory-store"', 'version = "0.1.0-dev"', 'edition = "2021"', 'license = "AGPL-3.0-or-later"', 'description = "Stub crate for optional hermes-memory integration."' | Set-Content -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-store' 'Cargo.toml') -Encoding UTF8
        '// Stub implementation.' | Set-Content -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-store' 'src' 'lib.rs') -Encoding UTF8
        '[package]', 'name = "hermes-memory-search"', 'version = "0.1.0-dev"', 'edition = "2021"', 'license = "AGPL-3.0-or-later"', 'description = "Stub crate for optional hermes-memory integration."' | Set-Content -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-search' 'Cargo.toml') -Encoding UTF8
        '// Stub implementation.' | Set-Content -Path (Join-Path $hermesRoot 'crates' 'hermes-memory-search' 'src' 'lib.rs') -Encoding UTF8
        Write-Host 'hermes-memory stubs created.'
