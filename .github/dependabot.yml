version: 2
updates:
  # Rust Cargo workspace
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      # serenity / rustls-webpki 上游 CVEs；Discord/Telegram 已默认禁用
      - dependency-name: "serenity"
      - dependency-name: "rustls-webpki"

  # Archived Tauri frontend (low priority, experimental)
  - package-ecosystem: "npm"
    directory: "/crates/clarity-tauri/frontend"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "javascript"
      - "archived"
    commit-message:
      prefix: "chore"
      include: "scope"
