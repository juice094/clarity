name: 功能请求
description: 提议新功能或改进
title: '[feat] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        感谢提出想法。请描述问题背景、方案与影响范围。
  - type: textarea
    id: problem
    attributes:
      label: 问题背景
      description: 你想解决什么问题？当前有什么痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案提议
      description: 期望的行为、API、UI 或命令行接口
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 考虑过哪些其他实现方式？
    validations:
      required: false
  - type: textarea
    id: scope
    attributes:
      label: 影响范围
      description: 涉及哪些 crate 或前端？是否与现有架构原则冲突？
    validations:
      required: false
