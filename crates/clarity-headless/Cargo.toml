[package]
name = "clarity-headless"
version = "0.1.0"
edition = "2021"

[dependencies]
clarity-core = { path = "../clarity-core" }
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bin]]
name = "clarity-headless"
path = "src/main.rs"
