[package]
name = "clarity-egui"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Clarity Desktop GUI powered by egui — replaces Tauri"

[dependencies]
eframe = { version = "0.31", default-features = false, features = ["default_fonts", "glow", "x11"] }
egui = "0.31"

serde = { workspace = true }
serde_json = { workspace = true }
toml = "0.8"
tokio = { workspace = true }
tokio-util = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
parking_lot = "0.12"
uuid = { workspace = true }
dirs = "5.0"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
regex = { workspace = true }
html-escape = "0.2"
once_cell = "1"
raw-window-handle = "0.6"
rfd = "0.15"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.61", features = ["Win32_Graphics_Dwm"] }

# Internal crates
clarity-core = { workspace = true }
clarity-memory = { path = "../clarity-memory" }
clarity-wire = { path = "../clarity-wire" }

[[bin]]
name = "clarity-egui"
path = "src/main.rs"
