<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity Web IDE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient-start: #0f0c29;
            --bg-gradient-mid: #302b63;
            --bg-gradient-end: #24243e;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --text-primary: #f0f0f5;
            --text-secondary: #a0a0b0;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --user-bubble: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --assistant-bubble: rgba(255, 255, 255, 0.06);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-mid) 50%, var(--bg-gradient-end) 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 14px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0 8px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 16px;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--user-bubble);
            display: grid;
            place-items: center;
            font-size: 1rem;
        }

        .new-chat-btn, .load-project-btn {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .new-chat-btn:hover, .load-project-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }

        .file-tree {
            flex: 1;
            overflow-y: auto;
            margin: 4px -4px 12px;
            font-size: 0.85rem;
            user-select: none;
        }
        .file-tree::-webkit-scrollbar { width: 6px; }
        .file-tree::-webkit-scrollbar-track { background: transparent; }
        .file-tree::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .tree-node {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s;
        }
        .tree-node:hover { background: var(--surface-hover); }
        .tree-node.file { padding-left: 26px; color: var(--text-secondary); }
        .tree-node.folder { font-weight: 500; color: var(--text-primary); }
        .tree-children { padding-left: 10px; }

        .hint-box {
            margin-top: auto;
            padding: 14px;
            background: rgba(139, 92, 246, 0.08);
            border: 1px solid rgba(139, 92, 246, 0.15);
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .hint-box strong { color: var(--text-primary); font-weight: 500; }

        /* Main area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        .chat-header {
            height: 64px;
            background: rgba(15, 12, 41, 0.6);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }

        .header-title { font-weight: 500; font-size: 1rem; }

        .badge {
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.25);
        }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .model-select {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .model-select option { background: #1a1a2e; color: var(--text-primary); }

        .provider-select {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
            width: 100%;
        }
        .provider-select option { background: #1a1a2e; color: var(--text-primary); }

        .provider-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .provider-box {
            padding: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
        }

        .hamburger {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.4rem;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
        }

        /* Split pane: editor + chat */
        .main-split {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #editor-container {
            flex: 2;
            min-height: 0;
            background: #1e1e1e;
            border-bottom: 1px solid var(--border);
        }

        #chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 260px;
            background: rgba(15, 12, 41, 0.25);
        }

        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 8%;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar { width: 8px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .message {
            display: flex;
            gap: 14px;
            margin-bottom: 24px;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .message.user { flex-direction: row-reverse; }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            display: grid;
            place-items: center;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .message.user .avatar {
            background: var(--user-bubble);
            color: white;
        }

        .message.assistant .avatar {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .bubble-wrap {
            max-width: 80%;
            display: flex;
            flex-direction: column;
        }

        .message.user .bubble-wrap { align-items: flex-end; }
        .message.assistant .bubble-wrap { align-items: flex-start; }

        .bubble {
            padding: 14px 18px;
            border-radius: var(--radius);
            font-size: 0.95rem;
            line-height: 1.7;
            box-shadow: var(--shadow);
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--user-bubble);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.assistant .bubble {
            background: var(--assistant-bubble);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 6px;
            backdrop-filter: blur(10px);
        }

        .bubble :is(h1,h2,h3,h4) { margin: 0.8em 0 0.4em; font-weight: 600; }
        .bubble p { margin: 0.6em 0; }
        .bubble p:first-child { margin-top: 0; }
        .bubble p:last-child { margin-bottom: 0; }
        .bubble ul, .bubble ol { margin: 0.6em 0; padding-left: 1.4em; }
        .bubble li { margin: 0.25em 0; }
        .bubble code {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.25);
            padding: 2px 6px;
            border-radius: 5px;
            font-size: 0.88em;
        }
        .bubble pre {
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
            overflow-x: auto;
            margin: 0.8em 0;
        }
        .bubble pre code {
            background: transparent;
            padding: 0;
            font-size: 0.85em;
        }
        .bubble blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            margin: 0.6em 0;
            color: var(--text-secondary);
        }
        .bubble hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
        .bubble a { color: #a78bfa; }
        .bubble table { border-collapse: collapse; margin: 0.6em 0; width: 100%; }
        .bubble th, .bubble td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
        .bubble th { background: rgba(0,0,0,0.2); }

        .meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .cursor {
            display: inline-block;
            width: 7px;
            height: 1.1em;
            background: var(--accent);
            border-radius: 2px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
            margin-left: 2px;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }
        .loading-dots span {
            width: 5px;
            height: 5px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Code block actions */
        .code-block-wrapper {
            margin: 0.8em 0;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .code-block-wrapper pre {
            margin: 0;
            border: none;
            border-radius: 0;
        }
        .code-toolbar {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            padding: 6px 10px;
            background: rgba(0,0,0,0.35);
            border-bottom: 1px solid var(--border);
        }
        .code-toolbar button {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 3px 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
        }
        .code-toolbar button:hover { color: var(--text-primary); background: var(--surface-hover); border-color: rgba(255,255,255,0.2); }

        /* Input area */
        .input-area {
            padding: 14px 8% 20px;
            background: linear-gradient(to top, rgba(15,12,41,0.95) 0%, rgba(15,12,41,0.6) 60%, transparent 100%);
            flex-shrink: 0;
        }

        .input-box {
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: flex-end;
            gap: 10px;
            padding: 10px 10px 10px 18px;
            backdrop-filter: blur(12px);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-box:focus-within {
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            max-height: 140px;
            padding: 8px 0;
            font-family: inherit;
        }

        .input-box textarea::placeholder { color: var(--text-secondary); }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: background 0.2s, transform 0.1s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) { background: var(--accent-hover); }
        .send-btn:active:not(:disabled) { transform: scale(0.96); }
        .send-btn:disabled { background: rgba(255,255,255,0.1); cursor: not-allowed; }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
        }
        .empty-state h2 { font-weight: 400; font-size: 1.3rem; margin-bottom: 8px; color: var(--text-primary); }
        .empty-state p { font-size: 0.9rem; }
        .empty-state .suggestions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .empty-state .chip {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .empty-state .chip:hover { background: var(--surface-hover); }

        /* Mobile */
        @media (max-width: 900px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 200;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 199;
            }
            .sidebar-overlay.show { display: block; }
            .hamburger { display: block; }
            .messages { padding: 14px 4%; }
            .input-area { padding: 10px 4% 14px; }
            #chat-panel { min-height: 200px; }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <div class="brand-icon">🜁</div>
            <div>Clarity IDE</div>
        </div>
        <button class="load-project-btn" onclick="loadProject()">
            <span>📁</span> 加载项目
        </button>
        <button class="new-chat-btn" onclick="newChat()">
            <span>+</span> 新对话
        </button>
        <div class="file-tree" id="file-tree">
            <div style="color:var(--text-secondary); padding: 8px;">点击“加载项目”获取文件列表</div>
        </div>
        <div class="provider-box">
            <div class="provider-label">Provider</div>
            <select id="provider-select" class="provider-select" onchange="switchProvider(this.value)">
                <option value="auto">🤖 Auto-detect</option>
                <option value="anthropic">🅰️ Anthropic (Claude)</option>
                <option value="kimi-code">🌙 Kimi Code</option>
                <option value="deepseek">🔮 DeepSeek</option>
                <option value="openai">🤖 OpenAI</option>
                <option value="kalosm">💻 Local (Kalosm)</option>
            </select>
            <div id="provider-status" style="font-size:0.7rem; color:#4ade80; margin-top:4px; display:none;">✓ 已切换</div>
        </div>
        <div class="hint-box">
            <strong>提示</strong><br>
            按 Enter 发送，Shift+Enter 换行。<br>
            点击文件在编辑器中打开，代码块可复制或插入编辑器。
        </div>
    </aside>

    <main class="chat-area">
        <header class="chat-header">
            <div class="header-left">
                <button class="hamburger" onclick="toggleSidebar()" aria-label="菜单">☰</button>
                <div class="header-title">Web IDE</div>
                <span class="badge" id="personality-badge">IDE + Chat</span>
            </div>
            <div class="header-right">
                <select id="model-select" class="model-select">
                    <option value="kimi-k2-07132k">kimi-k2-07132k</option>
                    <option value="kimi-k2">kimi-k2</option>
                    <option value="claude-3-sonnet">claude-3-sonnet</option>
                    <option value="gpt-4o">gpt-4o</option>
                </select>
            </div>
        </header>

        <div class="main-split">
            <div id="editor-container">
                <div style="display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-secondary); font-size:0.95rem;">
                    正在加载 Monaco Editor…
                </div>
            </div>

            <div id="chat-panel">
                <div class="messages" id="messages">
                    <div class="empty-state" id="empty-state">
                        <h2>今天想聊点什么？</h2>
                        <p>测试 Clarity Gateway 的流式对话能力</p>
                        <div class="suggestions">
                            <div class="chip" onclick="sendPreset('简单自我介绍')">简单自我介绍</div>
                            <div class="chip" onclick="sendPreset('用 Rust 写一个快速排序')">用 Rust 写一个快速排序</div>
                            <div class="chip" onclick="sendPreset('讲一个工程师笑话')">讲一个工程师笑话</div>
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <div class="input-box">
                        <textarea id="user-input" rows="1" placeholder="输入消息..."></textarea>
                        <button id="send-btn" class="send-btn" aria-label="发送">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script>
        const messagesEl = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');
        const emptyState = document.getElementById('empty-state');
        const personalityBadge = document.getElementById('personality-badge');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        let isGenerating = false;
        let messages = [];
        let editor = null;

        // Monaco init
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            const container = document.getElementById('editor-container');
            container.innerHTML = '';
            editor = monaco.editor.create(container, {
                value: '// 点击左侧“加载项目”，然后选择文件开始编辑\n// 或使用下方聊天面板与 Agent 对话',
                language: 'plaintext',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                fontFamily: "'JetBrains Mono', monospace",
                minimap: { enabled: true },
                scrollBeyondLastLine: false,
                padding: { top: 16 }
            });
        });

        async function detectPersonality() {
            try {
                const resp = await fetch('/health');
            } catch (e) {}
        }
        detectPersonality();

        userInput.addEventListener('input', () => {
            userInput.style.height = 'auto';
            userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
        });

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function renderMarkdown(text) {
            let html = escapeHtml(text);
            // code blocks
            html = html.replace(/```(\w*)?\n([\s\S]*?)```/g, (_, lang, code) => {
                return `<pre><code class="language-${lang || 'text'}">${code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</code></pre>`;
            });
            // inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            // bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__([^_]+)__/g, '<strong>$1</strong>');
            // italic
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            html = html.replace(/_([^_]+)_/g, '<em>$1</em>');
            // headers
            html = html.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');
            // blockquote
            html = html.replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>');
            // unordered list
            html = html.replace(/^\- (.*$)/gim, '<li>$1</li>');
            html = html.replace(/^(<li>.*<\/li>\n?)+/gim, (m) => `<ul>${m}</ul>`);
            // ordered list (simple)
            html = html.replace(/^\d+\.\s+(.*$)/gim, '<li>$1</li>');
            // horizontal rule
            html = html.replace(/^---$/gim, '<hr>');
            // paragraphs
            html = html.replace(/\n\n/g, '</p><p>');
            html = html.replace(/\n/g, '<br>');
            return '<p>' + html + '</p>';
        }

        function createMessageElement(role, htmlContent, isStreaming = false) {
            if (emptyState) emptyState.style.display = 'none';
            const wrapper = document.createElement('div');
            wrapper.className = `message ${role}`;
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'user' ? 'U' : 'C';
            const bubbleWrap = document.createElement('div');
            bubbleWrap.className = 'bubble-wrap';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = htmlContent;
            const meta = document.createElement('div');
            meta.className = 'meta';
            if (isStreaming) {
                meta.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';
                wrapper.dataset.streaming = 'true';
            } else {
                meta.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
            bubbleWrap.appendChild(bubble);
            bubbleWrap.appendChild(meta);
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubbleWrap);
            messagesEl.appendChild(wrapper);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return { wrapper, bubble, meta };
        }

        function updateMessageContent(bubble, text, isMarkdown) {
            if (isMarkdown) {
                bubble.innerHTML = renderMarkdown(text);
            } else {
                bubble.innerHTML = escapeHtml(text) + '<span class="cursor"></span>';
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function enhanceCodeBlocks(bubble) {
            const pres = bubble.querySelectorAll('pre');
            pres.forEach(pre => {
                if (pre.parentElement && pre.parentElement.classList.contains('code-block-wrapper')) return;
                const codeEl = pre.querySelector('code');
                const raw = codeEl ? codeEl.innerText : pre.innerText;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                wrapper.dataset.code = raw;
                const toolbar = document.createElement('div');
                toolbar.className = 'code-toolbar';
                toolbar.innerHTML = `
                    <button onclick="copyCode(this)">Copy</button>
                    <button onclick="insertToEditor(this)">Insert to Editor</button>
                `;
                pre.parentNode.insertBefore(wrapper, pre);
                wrapper.appendChild(toolbar);
                wrapper.appendChild(pre);
            });
        }

        window.copyCode = function(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const text = wrapper ? (wrapper.dataset.code || '') : '';
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = old, 1200);
            });
        };

        window.insertToEditor = function(btn) {
            const wrapper = btn.closest('.code-block-wrapper');
            const text = wrapper ? (wrapper.dataset.code || '') : '';
            if (editor) editor.setValue(text);
        };

        function finalizeMessage(meta, bubble, text) {
            bubble.innerHTML = renderMarkdown(text);
            enhanceCodeBlocks(bubble);
            meta.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        async function switchProvider(provider) {
            if (!provider || provider === 'auto') return;
            const statusEl = document.getElementById('provider-status');
            statusEl.style.display = 'none';
            try {
                const resp = await fetch('http://127.0.0.1:18800/api/provider', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ provider })
                });
                const data = await resp.json();
                if (resp.ok) {
                    statusEl.textContent = '✓ 已切换到 ' + provider;
                    statusEl.style.color = '#4ade80';
                } else {
                    statusEl.textContent = '✗ ' + (data.message || '切换失败');
                    statusEl.style.color = '#f87171';
                }
            } catch (err) {
                statusEl.textContent = '✗ 网络错误: ' + err.message;
                statusEl.style.color = '#f87171';
            }
            statusEl.style.display = 'block';
            setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
        }

        function newChat() {
            messages = [];
            messagesEl.innerHTML = `
                <div class="empty-state" id="empty-state">
                    <h2>今天想聊点什么？</h2>
                    <p>测试 Clarity Gateway 的流式对话能力</p>
                    <div class="suggestions">
                        <div class="chip" onclick="sendPreset('简单自我介绍')">简单自我介绍</div>
                        <div class="chip" onclick="sendPreset('用 Rust 写一个快速排序')">用 Rust 写一个快速排序</div>
                        <div class="chip" onclick="sendPreset('讲一个工程师笑话')">讲一个工程师笑话</div>
                    </div>
                </div>
            `;
            userInput.value = '';
            userInput.style.height = 'auto';
        }

        window.sendPreset = function(text) {
            userInput.value = text;
            sendMessage();
        };

        window.newChat = newChat;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isGenerating) return;

            messages.push({ role: 'user', content: text });
            createMessageElement('user', renderMarkdown(text));
            userInput.value = '';
            userInput.style.height = 'auto';
            isGenerating = true;
            sendBtn.disabled = true;

            const { bubble, meta } = createMessageElement('assistant', '<span class="cursor"></span>', true);
            let assistantText = '';

            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: messages,
                        stream: true
                    })
                });

                if (!response.ok) {
                    const err = await response.text();
                    throw new Error(`HTTP ${response.status}: ${err}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed.startsWith('data:')) continue;
                        const data = trimmed.slice(5).trim();
                        if (data === '[DONE]' || !data) continue;
                        try {
                            const json = JSON.parse(data);
                            const delta = json.choices?.[0]?.delta;
                            if (delta && delta.content) {
                                assistantText += delta.content;
                                updateMessageContent(bubble, assistantText, false);
                            }
                            if (json.choices?.[0]?.finish_reason) {
                                finalizeMessage(meta, bubble, assistantText);
                            }
                        } catch (e) {
                            console.warn('Parse SSE failed:', data);
                        }
                    }
                }

                finalizeMessage(meta, bubble, assistantText);
                messages.push({ role: 'assistant', content: assistantText });
            } catch (err) {
                bubble.innerHTML = '<p style="color:#f87171">❌ 请求失败: ' + escapeHtml(err.message) + '</p>';
                meta.textContent = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        /* ---------- File tree & IDE helpers ---------- */

        window.toggleSidebar = function() {
            sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        };

        window.loadProject = async function() {
            const treeEl = document.getElementById('file-tree');
            treeEl.innerHTML = '<div style="padding:8px; color:var(--text-secondary);">加载中...</div>';
            try {
                const resp = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: [{
                            role: 'user',
                            content: 'Use the glob tool to list all files in . (current directory) recursively and return ONLY a JSON array of relative file paths. No markdown, no explanation, just the raw JSON array.'
                        }],
                        stream: false
                    })
                });
                if (!resp.ok) throw new Error(await resp.text());
                const json = await resp.json();
                let content = json.choices?.[0]?.message?.content || '';
                // Try to extract JSON array
                let paths = [];
                const arrMatch = content.match(/\[[\s\S]*?\]/);
                if (arrMatch) {
                    try { paths = JSON.parse(arrMatch[0]); } catch (e) {}
                }
                if (!Array.isArray(paths) || paths.length === 0) {
                    treeEl.innerHTML = '<div style="padding:8px; color:#f87171;">无法解析为 JSON 数组，显示原始响应：</div><pre style="padding:8px; font-size:0.75rem; overflow:auto;">' + escapeHtml(content) + '</pre>';
                    return;
                }
                renderFileTree(paths);
            } catch (err) {
                treeEl.innerHTML = '<div style="padding:8px; color:#f87171;">加载失败: ' + escapeHtml(err.message) + '</div>';
            }
        };

        function renderFileTree(paths) {
            const root = {};
            paths.forEach(p => {
                const parts = String(p).replace(/\\/g, '/').split('/').filter(Boolean);
                let node = root;
                parts.forEach(part => {
                    if (!node[part]) node[part] = {};
                    node = node[part];
                });
            });
            const treeEl = document.getElementById('file-tree');
            treeEl.innerHTML = '';
            function buildDom(parentObj, container, prefix) {
                const entries = Object.keys(parentObj).sort();
                entries.forEach(name => {
                    const child = parentObj[name];
                    const isFile = Object.keys(child).length === 0;
                    const row = document.createElement('div');
                    row.className = isFile ? 'tree-node file' : 'tree-node folder';
                    row.textContent = (isFile ? '📄 ' : '📁 ') + name;
                    if (isFile) {
                        const fullPath = prefix + name;
                        row.onclick = (e) => {
                            e.stopPropagation();
                            openFile(fullPath);
                            if (window.innerWidth <= 900) toggleSidebar();
                        };
                        container.appendChild(row);
                    } else {
                        const childrenDiv = document.createElement('div');
                        childrenDiv.className = 'tree-children';
                        childrenDiv.style.display = 'block';
                        row.onclick = (e) => {
                            e.stopPropagation();
                            childrenDiv.style.display = childrenDiv.style.display === 'none' ? 'block' : 'none';
                        };
                        container.appendChild(row);
                        container.appendChild(childrenDiv);
                        buildDom(child, childrenDiv, prefix + name + '/');
                    }
                });
            }
            buildDom(root, treeEl, '');
        }

        window.openFile = async function(path) {
            if (!editor) return;
            editor.setValue('// 正在加载 ' + path + ' ...');
            try {
                const resp = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: modelSelect.value,
                        messages: [{
                            role: 'user',
                            content: `Read the file at "${path}" and return ONLY its raw content. Do not wrap it in markdown code blocks.`
                        }],
                        stream: false
                    })
                });
                if (!resp.ok) throw new Error(await resp.text());
                const json = await resp.json();
                let content = json.choices?.[0]?.message?.content || '';
                // Strip possible markdown wrapper
                const m = content.match(/^```[\w]*\n?([\s\S]*?)\n?```$/);
                if (m) content = m[1];
                editor.setValue(content);
                // Detect language
                const ext = path.split('.').pop().toLowerCase();
                const map = {
                    rs: 'rust', js: 'javascript', ts: 'typescript', jsx: 'javascript', tsx: 'typescript',
                    html: 'html', htm: 'html', css: 'css', scss: 'scss', sass: 'sass',
                    json: 'json', py: 'python', go: 'go', md: 'markdown',
                    toml: 'ini', yaml: 'yaml', yml: 'yaml', xml: 'xml',
                    c: 'c', cpp: 'cpp', cc: 'cpp', h: 'cpp', hpp: 'cpp',
                    java: 'java', cs: 'csharp', sh: 'shell', ps1: 'powershell',
                    sql: 'sql', php: 'php', rb: 'ruby', kt: 'kotlin',
                    swift: 'swift', r: 'r', dart: 'dart'
                };
                const lang = map[ext] || 'plaintext';
                monaco.editor.setModelLanguage(editor.getModel(), lang);
            } catch (err) {
                editor.setValue('// 加载失败: ' + err.message);
            }
        };
    </script>
</body>
