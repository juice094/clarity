[package]
name = "clarity-gateway"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "HTTP/WebSocket gateway for Project Clarity"

[dependencies]
# Workspace dependencies
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tokio-util = { workspace = true }
futures = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
async-trait = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }

# Internal dependencies
clarity-core = { workspace = true }

# Web dependencies
axum = { workspace = true }
tower-http = { workspace = true, features = ["cors", "fs", "trace"] }

# HTTP client for Telegram & Webhook
reqwest = { version = "0.12", features = ["json"] }

# Telegram Bot API (optional feature)
teloxide = { version = "0.12", optional = true }

# Discord Bot API (optional feature)
serenity = { version = "0.12", default-features = false, features = ["client", "gateway", "rustls_backend", "model", "cache", "framework"], optional = true }
poise = { version = "0.6", optional = true }

[features]
default = ["telegram", "discord", "webhook"]
telegram = ["dep:teloxide"]
discord = ["dep:serenity", "dep:poise"]
webhook = []
